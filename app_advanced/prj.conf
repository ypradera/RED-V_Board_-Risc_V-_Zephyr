CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# FE310 mtime runs at 32.768 kHz RTC clock
CONFIG_SYS_CLOCK_HW_CYCLES_PER_SEC=32768
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000

# Memory management
CONFIG_HEAP_MEM_POOL_SIZE=1024

# Event flags
CONFIG_EVENTS=y

# Security: stack overflow detection
CONFIG_THREAD_STACK_INFO=y
CONFIG_STACK_SENTINEL=y

# Thread runtime stats (for power management awareness)
CONFIG_THREAD_RUNTIME_STATS=y
